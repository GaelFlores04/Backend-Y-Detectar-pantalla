services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@db:3306/focusdb
    depends_on:
      - db
    volumes:
      - .:/app          # <-- sincroniza tu carpeta local con el contenedor

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: focusdb
    ports:
      - "3307:3306"